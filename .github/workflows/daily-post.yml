name: Daily ETNews Digest

on:
  schedule:
    - cron: '0 0 * * *'  # 0 UTC = 9 AM KST
  workflow_dispatch:  # allow manual trigger from the GitHub UI

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to push the generated posts and state file
      actions: write   # required to dispatch pages-deploy.yml after pushing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Java (for KoNLPy)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Cloudflare WARP
        # GitHub-hosted runners share Azure's public IP ranges, which ETNews
        # blocks at the network level (connect timeout, not an HTTP error).
        # Cloudflare WARP is a free consumer VPN (WireGuard-based, no account
        # needed) that routes traffic through Cloudflare's network instead,
        # giving the crawl step a non-Azure exit IP. It's disconnected again
        # right after the crawl so later steps (git push, gh CLI) keep using
        # the runner's normal network path.
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

          sudo systemctl enable --now warp-svc
          for i in $(seq 1 15); do
            warp-cli --accept-tos status >/dev/null 2>&1 && break
            sleep 1
          done

          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp
          warp-cli --accept-tos connect

          # "Success" from the commands above only means they were accepted, not
          # that the WireGuard tunnel actually came up - poll real status instead.
          connected=false
          for i in $(seq 1 30); do
            status=$(warp-cli --accept-tos status)
            echo "[${i}s] ${status}"
            if echo "$status" | grep -qi "Status update: Connected"; then
              connected=true
              break
            fi
            sleep 1
          done

          if [ "$connected" != "true" ]; then
            echo "::warning::WARP never reached Connected state - dumping warp-svc daemon logs"
            sudo journalctl -u warp-svc --no-pager -n 200 || true
            echo "Resetting WARP (mode off) so DNS/networking fall back to normal for the rest of the job"
            warp-cli --accept-tos disconnect || true
            warp-cli --accept-tos mode off || true
          else
            echo "--- Cloudflare trace (expect warp=on) ---"
            curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace || echo "trace curl failed"
            echo "--- Egress IP ---"
            curl -s --max-time 10 https://ifconfig.me || echo "ifconfig.me curl failed"; echo
          fi

          echo "--- ETNews reachability check ---"
          curl -sS -o /dev/null -w "HTTP %{http_code} connect:%{time_connect}s total:%{time_total}s\n" --max-time 15 "https://m.etnews.com/news/section.html?id1=04" || echo "STILL UNREACHABLE"

      - name: Run daily pipeline
        run: python scripts/run_daily.py

      - name: Disconnect Cloudflare WARP
        if: always()
        run: warp-cli --accept-tos disconnect || true

      - name: Commit and push if changes
        id: commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _posts/ data/processed_articles.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: auto-generated daily digest"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        # GITHUB_TOKEN-authenticated pushes never trigger other workflows
        # (GitHub's anti-recursion rule), so pages-deploy.yml won't fire on
        # its own push trigger for the commit above. workflow_dispatch calls
        # are exempt from that rule, so dispatch it explicitly instead.
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages-deploy.yml --ref main

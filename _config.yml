title: Daily IT News

# Short name shown under the home-screen icon when installed as a PWA
# (keep it short - ~12 characters is the usual safe limit on phone home screens).
pwa_short_name: "IT News"

author:
  name: "COLD9"
  email: "goldrocket18@gmail.com"
  links:
    - label: "DOCS4COLD9"
      icon: "/assets/icons/docs4cold9.png"
      url: "https://cold9.gitlab.io/blog"
    - label: "ETNews"
      icon: "/assets/icons/etn.png"
      url: "https://m.etnews.com"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ColdNine/coldnine.github.io"

description: >- # this means to ignore newlines until "baseurl:"
  Daily news keywords, crawled automatically.

baseurl: "" # the subpath of your site, e.g. /blog

url: "https://coldnine.github.io" # the base hostname & protocol for your site, e.g. http://example.com

github_username: coldnine

# Files/dirs that are part of this repo's automation tooling, not the site itself -
# keep them out of the built _site output.
exclude:
  - scripts/
  - data/
  - config.yml
  - requirements.txt
  - README.md
  - PRD.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock

# Build settings
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default"

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-include-cache

# Pagination (used by the blog home page)
paginate: 5
paginate_path: /page:num/

# Built-in Lunr search - handy once daily posts pile up
search: true

# Comments: routed through a custom provider so the existing Talkyard
# integration (_includes/talkyard-comments.html) keeps working under the
# new theme. See _includes/comments-providers/custom.html.
comments:
  provider: "custom"

# Front matter defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Talkyard
#  - https://jekyll-demo.talkyard.io/2018/01/09/installation-instructions.html
#  - https://www.talkyard.net/-/create-site/embedded-comments
#  - https://comments-for-coldnine-github-io.talkyard.net
talkyard_server_url: https://site-1jur3p7p01.talkyard.net
talkyard_script_url: https://c1.ty-cdn.net/-/talkyard-comments.min.js

timezone: Asia/Seoul
